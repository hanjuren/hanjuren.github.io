name: Deploy to Pages

on:
  push:
    branches: [main]
  # 개발 중 임시 비활성화 (완성 후 주석 해제 — 하루 2회 자동 수집·배포)
  # schedule:
  #   - cron: '0 21,3 * * *'   # UTC 21:00, 03:00 = KST 06:00, 12:00 (하루 2회)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 개발 중 임시 비활성화 (완성 후 주석 해제 — 수집 후 Supabase notices 테이블에 upsert)
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      # - name: 공고 수집 (마이홈 + LH → Supabase)
      #   run: |
      #     echo "DATA_GO_KR_KEY=${{ secrets.DATA_GO_KR_KEY }}" > .env
      #     echo "SUPABASE_URL=https://nknxzlrqffoqcbooghvb.supabase.co" >> .env
      #     echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
      #     echo "KAKAO_REST_KEY=${{ secrets.KAKAO_REST_KEY }}" >> .env
      #     python3 collector/collect.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
