<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>청약 캘린더 — 서울·경기 공공임대</title>
<meta name="theme-color" content="#0d0d0d">
<style>
  @font-face {
    font-family: "Pretendard Variable";
    font-weight: 45 920;
    font-style: normal;
    font-display: swap;
    src: url("vendor/PretendardVariable.woff2") format("woff2-variations");
  }
</style>
<script src="vendor/fullcalendar.min.js"></script>
<script src="vendor/supabase.js"></script>
<script src="data.js"></script>
<script src="config.js" onerror="void 0"></script>
<style>
  /* ── 디자인 토큰 (dataviz 검증 팔레트) ─────────────────── */
  :root {
    --page:     #f9f9f7;
    --surface:  #fcfcfb;
    --ink:      #0b0b0b;
    --ink-2:    #52514e;
    --muted:    #898781;
    --hairline: #e1e0d9;
    --ring:     rgba(11,11,11,.10);
    --seoul:    #2a78d6;   /* categorical slot 1 · blue */
    --gyeonggi: #1baf7a;   /* categorical slot 2 · aqua */
    --winner:   #eda100;   /* categorical slot 3 · yellow */
    --seoul-bg:    rgba(42,120,214,.11);
    --gyeonggi-bg: rgba(27,175,122,.13);
    --winner-bg:   rgba(237,161,0,.15);
    --critical: #d03b3b;
    --shadow: 0 1px 2px rgba(11,11,11,.04), 0 8px 24px rgba(11,11,11,.05);
  }
  :root[data-theme="dark"] {
    --page:     #0d0d0d;
    --surface:  #1a1a19;
    --ink:      #ffffff;
    --ink-2:    #c3c2b7;
    --muted:    #898781;
    --hairline: #2c2c2a;
    --ring:     rgba(255,255,255,.10);
    --seoul:    #3987e5;
    --gyeonggi: #199e70;
    --winner:   #c98500;
    --seoul-bg:    rgba(57,135,229,.18);
    --gyeonggi-bg: rgba(25,158,112,.20);
    --winner-bg:   rgba(201,133,0,.20);
    --critical: #d03b3b;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --page:     #0d0d0d;
      --surface:  #1a1a19;
      --ink:      #ffffff;
      --ink-2:    #c3c2b7;
      --muted:    #898781;
      --hairline: #2c2c2a;
      --ring:     rgba(255,255,255,.10);
      --seoul:    #3987e5;
      --gyeonggi: #199e70;
      --winner:   #c98500;
      --seoul-bg:    rgba(57,135,229,.18);
      --gyeonggi-bg: rgba(25,158,112,.20);
      --winner-bg:   rgba(201,133,0,.20);
      --critical: #d03b3b;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font-family: "Pretendard Variable", Pretendard, system-ui, -apple-system, sans-serif;
    font-size: 14px; line-height: 1.5;
    overflow-x: hidden;              /* 가로 오버플로우 원천 차단 */
  }
  /* FullCalendar 이벤트가 셀 폭을 밀어내 캘린더가 뷰포트를 넘는 것 방지.
     table-layout:fixed로 7열을 항상 컨테이너에 균등 분할, 이벤트는 셀 안에서 클립 */
  .fc .fc-scrollgrid-sync-table,
  .fc .fc-col-header,
  .fc .fc-daygrid-body,
  .fc .fc-daygrid-body > table { width: 100% !important; }
  .fc .fc-scrollgrid-sync-table,
  .fc .fc-col-header { table-layout: fixed !important; }
  .fc-daygrid-event-harness { max-width: 100%; }
  .fc .fc-daygrid-day-events { overflow: hidden; }
  /* 캘린더 내부 요소가 min-content(이벤트 막대 폭)로 뷰포트를 넘지 않게 강제 축소 */
  .card, #calendar,
  .fc, .fc-view-harness, .fc-scrollgrid, .fc-scrollgrid > *,
  .fc-scrollgrid table, .fc-col-header-cell, .fc-daygrid-day,
  .fc-daygrid-day-frame, .fc-daygrid-day-events,
  .fc-daygrid-event-harness, .fc-daygrid-event, .ev { min-width: 0 !important; }

  /* ── 헤더 (1단: 브랜드+계정 / 2단: 필터+뷰탭) ───────────── */
  header {
    position: sticky; top: 0; z-index: 30;
    display: flex; flex-direction: column; gap: 10px;
    padding: 12px 28px 14px;
    background: color-mix(in srgb, var(--page) 93%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--hairline);
  }
  .hrow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    background: linear-gradient(135deg, var(--seoul), var(--gyeonggi));
    color: #fff; font-size: 15px;
  }
  .brand h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -.2px; }
  .brand .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .seg {
    display: inline-flex; padding: 3px; gap: 2px;
    background: color-mix(in srgb, var(--ink) 6%, transparent);
    border-radius: 10px;
  }
  .seg button {
    border: none; background: transparent; color: var(--ink-2); cursor: pointer;
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    font-family: inherit; transition: all .15s ease;
  }
  /* 선택 상태: 라이트=흰 서피스+그림자, 다크=밝은 틴트 (지역/내청약/신규 공통) */
  .seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
  :root[data-theme="dark"] .seg button.on {
    background: color-mix(in srgb, var(--ink) 20%, var(--surface));
    box-shadow: none;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .seg button.on {
      background: color-mix(in srgb, var(--ink) 20%, var(--surface));
      box-shadow: none;
    }
  }
  .seg button .cnt { color: var(--muted); font-weight: 700; }
  .seg button.on .cnt { color: var(--ink-2); }
  .theme-btn {
    border: 1px solid var(--hairline); background: transparent; color: var(--ink-2);
    width: 34px; height: 32px; border-radius: 9px; cursor: pointer; font-size: 15px;
    font-family: inherit; display: grid; place-items: center; line-height: 1;
  }
  .theme-btn:hover { background: color-mix(in srgb, var(--ink) 5%, transparent); }
  .authbtn {
    border: 1px solid var(--hairline); background: transparent; color: var(--ink-2);
    padding: 6px 13px; border-radius: 9px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; font-family: inherit; white-space: nowrap; max-width: 160px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .authbtn:hover { background: color-mix(in srgb, var(--ink) 5%, transparent); }
  .authbtn.in { color: var(--ink); }
  /* 목록 뷰 헤더에 실제로 보이는 월 선택 위젯 */
  #mpick.shown {
    display: inline-block; flex: 0 0 auto; width: auto; max-width: 150px;
    background: transparent; color: var(--ink);
    border: 1px solid var(--hairline); border-radius: 8px;
    padding: 5px 8px; font-family: inherit; font-size: 12.5px; font-weight: 600;
    color-scheme: light dark;
  }
  #calendar .fc-toolbar-chunk:last-child { display: flex; justify-content: flex-end; }
  :root[data-theme="dark"] #mpick.shown { color-scheme: dark; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) #mpick.shown { color-scheme: dark; }
  }
  .status-seg { display: flex; gap: 5px; flex-wrap: wrap; }
  .status-seg button {
    border: 1px solid var(--hairline); background: transparent; color: var(--ink-2);
    padding: 5px 11px; border-radius: 999px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .status-seg button.on { background: var(--ink); border-color: var(--ink); color: var(--page); }
  .login-hint {
    width: 100%; padding: 10px; border: 1px solid var(--hairline); background: transparent;
    color: var(--ink-2); border-radius: 10px; font-weight: 700; font-size: 13px;
    font-family: inherit; cursor: pointer;
  }
  .login-hint:hover { background: color-mix(in srgb, var(--ink) 5%, transparent); }
  .my-box { border-top: 1px solid var(--hairline); margin-top: 14px; padding-top: 14px; }
  .my-box .row-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
  .my-box textarea {
    width: 100%; margin-top: 10px; min-height: 52px; resize: vertical;
    background: color-mix(in srgb, var(--ink) 5%, transparent); color: var(--ink);
    border: 1px solid var(--hairline); border-radius: 10px; padding: 9px 11px;
    font-family: inherit; font-size: 13px;
  }
  .my-box textarea:focus { outline: none; border-color: var(--muted); }
  .spacer { margin-left: auto; }
  .updated { font-size: 12px; color: var(--muted); }

  /* ── 레이아웃 ──────────────────────────────────────────── */
  main { max-width: 1240px; margin: 0 auto; padding: 24px 28px 48px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 14px;
    padding: 16px 18px; box-shadow: var(--shadow);
  }
  .stat .label { font-size: 12px; color: var(--ink-2); font-weight: 600; }
  .stat .value { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-top: 2px; }
  .stat .value small { font-size: 13px; font-weight: 600; color: var(--muted); margin-left: 2px; }
  .stat .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .grid { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
  /* 뷰 전환: 목록·지도는 기본 숨김, 탭 선택 시 JS가 표시 */
  #list-view, #map-view { display: none; }
  #mobileListCard { max-width: 760px; margin: 0 auto; }
  .card {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 16px;
    box-shadow: var(--shadow); padding: 18px;
  }

  /* ── 마감 임박 패널 ────────────────────────────────────── */
  .panel h3 { margin: 2px 4px 12px; font-size: 13px; font-weight: 700; color: var(--ink-2); }
  .due { display: flex; flex-direction: column; gap: 6px; }
  .due-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 11px; cursor: pointer; transition: background .12s ease;
  }
  .due-item:hover { background: color-mix(in srgb, var(--ink) 5%, transparent); }
  .due-item .dot { width: 8px; height: 8px; border-radius: 3px; flex: none; }
  .due-item .t { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .due-item .t .name {
    display: block; font-size: 12.5px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .due-item .t .when { display: block; font-size: 11px; color: var(--muted); }
  .stb {
    display: inline-block; font-size: 10px; font-weight: 800; line-height: 1;
    padding: 2px 6px; border-radius: 5px; margin-right: 5px; vertical-align: 1px;
  }
  .stb.open { background: color-mix(in srgb, #0ca30c 20%, transparent); color: #0ca30c; }
  .stb.soon { background: color-mix(in srgb, var(--ink) 9%, transparent); color: var(--ink-2); }
  .dday {
    flex: none; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 999px;
    background: color-mix(in srgb, var(--ink) 7%, transparent); color: var(--ink-2);
  }
  .dday.urgent { background: color-mix(in srgb, var(--critical) 14%, transparent); color: var(--critical); }
  .due-item .fav {
    flex: none; background: none; border: none; cursor: pointer; padding: 4px;
    font-size: 18px; line-height: 1; color: var(--muted); transition: transform .12s ease;
  }
  .due-item .fav.on { color: var(--winner); }
  .due-item .fav:active { transform: scale(1.35); }
  .empty { padding: 20px 8px; text-align: center; color: var(--muted); font-size: 12.5px; }

  /* 모바일 공고 리스트 (진행중/마감 필터) */
  .mobile-list-card { display: block; }
  .lfilter { display: flex; gap: 6px; margin-bottom: 14px; }
  .lfilter button {
    flex: 1; padding: 9px; border: 1px solid var(--hairline); background: transparent;
    color: var(--ink-2); border-radius: 10px; font-weight: 700; font-size: 13px;
    font-family: inherit; cursor: pointer;
  }
  .lfilter button.on { background: var(--ink); color: var(--page); border-color: var(--ink); }
  .listctl { display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .listctl select {
    background: transparent; color: var(--ink-2);
    border: 1px solid var(--hairline); border-radius: 8px; padding: 6px 8px;
    font-family: inherit; font-size: 12px; font-weight: 600; color-scheme: light dark;
  }

  /* ── FullCalendar 리스타일 ─────────────────────────────── */
  #calendar { --fc-border-color: var(--hairline); --fc-page-bg-color: transparent;
              --fc-today-bg-color: color-mix(in srgb, var(--seoul) 5%, transparent); font-size: 12.5px; }
  .fc .fc-toolbar-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
  .fc .fc-button {
    background: transparent; border: 1px solid var(--hairline); color: var(--ink-2);
    font-weight: 600; font-size: 12.5px; border-radius: 8px; padding: 5px 10px;
    font-family: inherit; box-shadow: none !important;
  }
  .fc .fc-button:hover { background: color-mix(in srgb, var(--ink) 5%, transparent); color: var(--ink); }
  .fc .fc-button-primary:not(:disabled).fc-button-active,
  .fc .fc-button-primary:not(:disabled):active { background: var(--ink); border-color: var(--ink); color: var(--page); }
  .fc .fc-col-header-cell-cushion { color: var(--muted); font-weight: 600; font-size: 11.5px; padding: 8px 4px; }
  .fc .fc-daygrid-day-number { color: var(--ink-2); font-weight: 600; font-size: 12px; padding: 6px 8px; }
  .fc .fc-day-today .fc-daygrid-day-number {
    background: var(--seoul); color: #fff; border-radius: 999px;
    min-width: 22px; height: 22px; display: inline-grid; place-items: center; padding: 0 4px; margin: 4px;
  }
  .fc .fc-day-sat .fc-daygrid-day-number { color: var(--seoul); }
  .fc .fc-day-sun .fc-daygrid-day-number { color: var(--critical); }
  .fc-theme-standard td, .fc-theme-standard th, .fc-theme-standard .fc-scrollgrid { border-color: var(--hairline); }

  .fc-event { border: none !important; border-radius: 6px; font-family: inherit; }
  .fc-event .fc-event-main { padding: 1px 6px; }
  .ev { display: flex; align-items: center; gap: 5px; min-width: 0; }
  .ev .pin { width: 6px; height: 6px; border-radius: 2px; flex: none; }
  .ev .txt {
    font-size: 11px; font-weight: 600; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fc-daygrid-dot-event:hover { background: color-mix(in srgb, var(--ink) 6%, transparent); }
  .fc .fc-popover {
    background: var(--surface); border: 1px solid var(--ring); border-radius: 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,.35); z-index: 40; overflow: hidden;
  }
  .fc .fc-popover-header {
    background: color-mix(in srgb, var(--ink) 5%, transparent);
    padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--ink-2);
  }
  .fc .fc-popover-close { color: var(--muted); opacity: 1; }
  .fc .fc-popover-body { padding: 6px 8px; max-height: 320px; overflow-y: auto; }
  .fc .fc-popover-body .fc-daygrid-event-harness { margin: 2px 0; }
  .fc .fc-list { border: none; }
  .fc .fc-list-day-cushion { background: color-mix(in srgb, var(--ink) 5%, transparent); font-weight: 700; }
  .fc .fc-list-day.jump-hi .fc-list-day-cushion {
    background: color-mix(in srgb, var(--seoul) 22%, transparent);
    transition: background .3s ease;
  }
  .fc .fc-list-day { scroll-margin-top: 150px; }  /* 스티키 헤더에 가리지 않게 */
  .fc .fc-list-event:hover td { background: color-mix(in srgb, var(--ink) 5%, transparent); }
  .fc .fc-list-event td { border-color: var(--hairline); padding: 11px 12px; cursor: pointer; }
  .fc .fc-list-event-graphic, .fc .fc-list-event-dot { display: none; }  /* 우리 색점(.lpin) 사용 */
  .fc .fc-list-event-time { display: none; }  /* 종일 일정이라 시간 불필요 */
  .fc .fc-list-event-title { font-size: 13px; font-weight: 600; }
  .fc-theme-standard .fc-list-day th { border-color: var(--hairline); }
  .lpin { flex: none; width: 9px; height: 9px; border-radius: 3px; }

  .legend { display: flex; gap: 16px; justify-content: center; margin-top: 14px;
            font-size: 12px; color: var(--ink-2); font-weight: 600; }
  .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 5px; }

  /* ── 지도 ──────────────────────────────────────────────── */
  #map-view { display: none; }
  #map { width: 100%; height: calc(100vh - 220px); min-height: 420px; border-radius: 12px; overflow: hidden; }
  .map-placeholder {
    display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center;
    height: 100%; min-height: 420px; border: 1.5px dashed var(--hairline); border-radius: 12px;
    color: var(--muted); text-align: center; line-height: 1.7; font-size: 13px;
  }
  .map-placeholder .big { font-size: 34px; }
  .map-placeholder code {
    background: color-mix(in srgb, var(--ink) 7%, transparent);
    padding: 2px 7px; border-radius: 6px; font-size: 12px;
  }

  /* ── 상세 다이얼로그 ───────────────────────────────────── */
  dialog {
    border: 1px solid var(--ring); border-radius: 18px; padding: 0;
    max-width: 500px; width: 92%; background: var(--surface); color: var(--ink);
    box-shadow: 0 24px 64px rgba(0,0,0,.28);
  }
  dialog::backdrop { background: rgba(0,0,0,.4); backdrop-filter: blur(2px); }
  .dlg-body { padding: 22px 24px 8px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .chip {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    background: color-mix(in srgb, var(--ink) 7%, transparent); color: var(--ink-2);
  }
  .chip.region-seoul    { background: var(--seoul-bg);    color: var(--seoul); }
  .chip.region-gyeonggi { background: var(--gyeonggi-bg); color: var(--gyeonggi); }
  .chip.dchip { background: color-mix(in srgb, var(--critical) 13%, transparent); color: var(--critical); }
  .chip.src { background: transparent; border: 1px solid var(--hairline); color: var(--muted); }
  .dlg-body h2 { font-size: 15.5px; font-weight: 700; margin: 0 0 4px; line-height: 1.45; letter-spacing: -.2px; }
  .dlg-body .meta { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .kv { display: grid; grid-template-columns: 96px 1fr; row-gap: 7px; font-size: 13px;
        border-top: 1px solid var(--hairline); padding-top: 14px; }
  .kv .k { color: var(--muted); font-weight: 600; font-size: 12px; padding-top: 1px; }
  .kv .v { font-weight: 500; word-break: keep-all; }
  .kv .v.strong { font-weight: 700; }
  .dlg-actions { display: flex; gap: 8px; justify-content: flex-end; padding: 16px 24px 20px; }
  .btn {
    padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 700;
    text-decoration: none; cursor: pointer; font-family: inherit;
    border: 1px solid var(--hairline); color: var(--ink); background: transparent;
    transition: all .12s ease;
  }
  .btn:hover { background: color-mix(in srgb, var(--ink) 5%, transparent); }
  .btn.primary { background: var(--ink); border-color: var(--ink); color: var(--page); }
  .btn.primary:hover { opacity: .85; }

  @media (max-width: 900px) {
    main { padding: 16px 14px 40px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .grid { grid-template-columns: 1fr; }
    header { padding: 12px 14px; gap: 10px; }
    .updated { display: none; }
  }

  /* ── 모바일(폰) 전용 ─────────────────────────────────── */
  @media (max-width: 560px) {
    body { font-size: 13px; }
    #mobileListCard { max-width: none; }   /* 폰에선 전체 폭 */
    #tabCal { display: none; }             /* 폰: 캘린더 탭 숨김 (셀 좁아 부적합) */
    /* 아이폰 노치/홈바 safe-area */
    header {
      gap: 10px;
      padding: 10px 12px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
    }
    main { padding: 14px 12px calc(40px + env(safe-area-inset-bottom)); }

    .brand .mark { width: 26px; height: 26px; font-size: 13px; }
    .brand h1 { font-size: 15px; }
    .brand .sub { font-size: 11px; }
    .seg { padding: 2px; }
    .seg button { padding: 7px 11px; font-size: 12px; }  /* 터치 타겟 유지 */
    .theme-btn { width: 32px; height: 32px; }
    .authbtn { max-width: 120px; padding: 6px 10px; font-size: 12px; }
    /* 2단: 필터는 왼쪽, 뷰탭은 아래 줄 전체 폭 (목록/지도 반반) */
    #viewTabs { flex: 1 1 100%; display: flex; }
    #viewTabs button { flex: 1; }

    /* 스탯 타일 압축 */
    .stat { padding: 13px 14px; border-radius: 12px; }
    .stat .value { font-size: 22px; }
    .stat .label { font-size: 11.5px; }
    .stat .hint { display: none; }
    .stats { gap: 8px; }

    .card { padding: 14px; border-radius: 14px; }

    /* 캘린더 툴바/셀 축소 */
    #calendar { font-size: 11px; }
    .fc .fc-toolbar.fc-header-toolbar { margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
    .fc .fc-toolbar-title { font-size: 15px; }
    .fc .fc-button { padding: 4px 8px; font-size: 11.5px; }
    .fc .fc-col-header-cell-cushion { font-size: 10.5px; padding: 6px 2px; }
    .fc .fc-daygrid-day-number { font-size: 11px; padding: 4px 5px; }
    .ev .txt { font-size: 10px; }
    .fc .fc-daygrid-more-link { font-size: 10px; }

    /* 상세 다이얼로그 */
    dialog { width: 94%; border-radius: 16px; }
    .dlg-body { padding: 18px 18px 6px; }
    .dlg-body h2 { font-size: 14.5px; }
    .kv { grid-template-columns: 78px 1fr; font-size: 12.5px; }
    .dlg-actions { padding: 14px 18px 18px; }

    /* 마감 임박 리스트 */
    .due-item { padding: 9px 10px; }
    .due-item .t .name { font-size: 12px; }
  }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand">
      <div class="mark">🏠</div>
      <div>
        <h1>청약 캘린더</h1>
        <div class="sub">서울 · 경기 공공임대</div>
      </div>
    </div>
    <div class="spacer"></div>
    <span class="updated" id="updated"></span>
    <button id="authBtn" class="authbtn">로그인</button>
    <button id="themeBtn" class="theme-btn" title="테마 전환"></button>
  </div>
  <div class="hrow">
    <div class="seg" id="regionFilter">
      <button data-r="" class="on">전체</button>
      <button data-r="서울특별시">서울</button>
      <button data-r="경기도">경기</button>
    </div>
    <div class="seg">
      <button id="myToggle">⭐ 내 청약 <span id="myCount" class="cnt"></span></button>
    </div>
    <div class="spacer"></div>
    <div class="seg" id="viewTabs">
      <button id="tabCal" class="on">캘린더</button>
      <button id="tabList">목록</button>
      <button id="tabMap">지도</button>
    </div>
  </div>
</header>

<input type="date" id="mpick" aria-label="날짜로 이동" hidden>
<main>
  <div class="stats" id="stats"></div>

  <div id="cal-view" class="grid">
    <div class="card">
      <div id="calendar"></div>
      <div class="legend">
        <span><i style="background:var(--seoul)"></i>서울</span>
        <span><i style="background:var(--gyeonggi)"></i>경기</span>
        <span><i style="background:var(--winner)"></i>당첨자 발표</span>
      </div>
    </div>
    <div class="card panel">
      <h3>📌 접수 마감 임박</h3>
      <div class="due" id="dueList"></div>
      <h3 style="margin-top:20px">🔄 상시 · 수시 모집</h3>
      <div class="due" id="rollingList"></div>
    </div>
  </div>

  <div id="list-view">
    <div class="card mobile-list-card" id="mobileListCard">
      <div class="lfilter" id="listFilter">
        <button data-f="open" class="on">진행 중</button>
        <button data-f="closed">마감</button>
      </div>
      <div class="listctl" id="listCtl">
        <select id="sortSel" aria-label="정렬">
          <option value="deadline">마감 임박순</option>
          <option value="deadlineDesc">마감 여유순</option>
          <option value="notice">최신 공고순</option>
        </select>
      </div>
      <div class="due" id="mobileList"></div>
    </div>
  </div>

  <div id="map-view">
    <div class="card">
      <div id="map"><div class="map-placeholder">
        <div class="big">🗺</div>
        <div><b>지도 뷰 준비 중</b><br>
        Kakao 지도 키 등록 후 활성화됩니다.<br>
        <code>web/config.js</code>에 <code>window.KAKAO_JS_KEY = '...'</code> 추가</div>
      </div></div>
    </div>
  </div>
</main>

<dialog id="dlg">
  <div class="dlg-body">
    <div class="chips" id="dlgChips"></div>
    <h2 id="dlgTitle"></h2>
    <div class="meta" id="dlgMeta"></div>
    <div class="kv" id="dlgKv"></div>
    <div class="my-box">
      <div class="row-label">내 청약 관리</div>
      <div class="status-seg" id="dlgStatus"></div>
      <textarea id="dlgMemo" placeholder="메모 (예: 필요 서류, 순위 조건 확인 등)"></textarea>
    </div>
  </div>
  <div class="dlg-actions">
    <button class="btn" onclick="dlg.close()">닫기</button>
    <a id="dlgLink" class="btn primary" target="_blank" rel="noopener">공고 원문 보기 ↗</a>
  </div>
</dialog>

<script>
const DATA = window.NOTICES || { notices: [], updatedAt: '?', count: 0 };
const TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);
const todayISO = TODAY.toLocaleDateString('sv-SE');
let region = '';
let myOnly = false;
let calendar;
let session = null;   // Supabase 로그인 세션 (null = 비로그인)
const IS_PHONE = window.matchMedia('(max-width: 560px)').matches;
let currentView = IS_PHONE ? 'list' : 'calendar';   // calendar | list | map (폰은 목록 기본)
const nowISO = () => new Date().toISOString();
let listMode = 'open';      // 모바일 리스트 필터: open(진행중) | closed(마감)
let sortMode = 'deadline';  // 진행중 정렬: deadline | deadlineDesc | notice

/* ── 테마 (시스템 → 라이트 → 다크 순환, localStorage 저장) ── */
const THEME_KEY = 'cheongyak-theme';
const THEME_ORDER = ['system', 'light', 'dark'];
const THEME_ICON = { system: '🌗', light: '☀️', dark: '🌙' };
function applyTheme(mode) {
  const root = document.documentElement;
  if (mode === 'system') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', mode);
  document.getElementById('themeBtn').textContent = THEME_ICON[mode];
}
let theme = localStorage.getItem(THEME_KEY) || 'system';
applyTheme(theme);
document.getElementById('themeBtn').onclick = () => {
  theme = THEME_ORDER[(THEME_ORDER.indexOf(theme) + 1) % THEME_ORDER.length];
  localStorage.setItem(THEME_KEY, theme);
  applyTheme(theme);
};

/* ── 내 청약 (로그인 시에만, Supabase에만 저장 — 로컬 저장 안 함) ── */
const STATUSES = ['관심', '신청완료', '서류제출', '당첨', '탈락'];
let my = {};                       // 로그인 시 Supabase에서 채움, 로그아웃 시 비움
const saveMy = () => updateMyCount();   // 메모리 상태만 (영속화는 Supabase가 담당)
const updateMyCount = () => {
  const n = Object.keys(my).length;
  document.getElementById('myCount').textContent = n ? `${n}` : '';
};
// 로그인 유도 (내 청약 기능은 로그인 필요)
function promptLogin() {
  if (confirm('내 청약 기능은 로그인이 필요합니다. 구글로 로그인할까요?')) {
    sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: location.origin + location.pathname },
    });
  }
}

/* ── 마지막 업데이트 표시 (GitHub Actions가 하루 2회 자동 갱신) ── */
document.getElementById('updated').textContent =
  DATA.updatedAt ? `${DATA.updatedAt} 업데이트` : '';

const seriesOf = n => n.region === '서울특별시'
  ? { color: 'var(--seoul)', bg: 'var(--seoul-bg)' }
  : { color: 'var(--gyeonggi)', bg: 'var(--gyeonggi-bg)' };

const filtered = () => DATA.notices.filter(n =>
  (!region || n.region === region) && (!myOnly || my[n.id]));

/* 일부 공고(예: 분양전환공공임대)는 청약접수 필드가 비어 있어
   공고일~공고마감일(close)을 기간으로 폴백한다. */
const effStart = n => n.dates.applyStart || n.dates.notice;
const effEnd = n => n.dates.applyEnd || n.dates.close;

/* 수시/상시 모집: 접수기간이 3주를 넘거나 제목에 수시·상시가 들어간 공고.
   캘린더 막대로 그리면 매주 도배되므로 사이드 패널로 분리한다. */
function isRolling(n) {
  if (/수시|상시/.test(n.title)) return true;
  const s = effStart(n), e = effEnd(n);
  if (s && e) {
    return (new Date(e) - new Date(s)) / 86400000 > 21;
  }
  return false;
}

function dday(iso) {
  const diff = Math.round((new Date(iso + 'T00:00:00') - TODAY) / 86400000);
  return diff === 0 ? 'D-DAY' : diff > 0 ? `D-${diff}` : `D+${-diff}`;
}
function plusDay(iso) {
  const d = new Date(iso + 'T00:00:00'); d.setDate(d.getDate() + 1);
  return d.toLocaleDateString('sv-SE');
}
const fmtWon = v => v ? Number(v).toLocaleString('ko-KR') + '원' : '';
const fmtRange = (a, b) => a ? `${a} ~ ${b || ''}` : '';
const fmtMD = iso => { const p = iso.split('-'); return `${+p[1]}/${+p[2]}`; };

/* 공고의 접수 상태: 접수중 / 접수예정(시작일) / 마감 */
function applyState(n) {
  const s = n.dates.applyStart, e = effEnd(n);
  if (!e) return null;
  if (e < todayISO) return { cls: 'closed', label: '마감' };
  if (s && s > todayISO) return { cls: 'soon', label: `${fmtMD(s)} 접수시작` };
  return { cls: 'open', label: '접수중' };
}

/* ── 스탯 타일 ── */
function renderStats() {
  const ns = filtered();
  const open = ns.filter(n => effStart(n) && effStart(n) <= todayISO
                           && todayISO <= (effEnd(n) || effStart(n)));
  const upcoming = ns.filter(n => effStart(n) && effStart(n) > todayISO);
  const winSoon = ns.filter(n => n.dates.winner && n.dates.winner >= todayISO);
  document.getElementById('stats').innerHTML = [
    ['전체 공고', ns.length, '건', '수집된 모집공고'],
    ['접수 중', open.length, '건', '오늘 신청 가능'],
    ['접수 예정', upcoming.length, '건', '접수 시작 전'],
    ['발표 대기', winSoon.length, '건', '당첨자 발표 예정'],
  ].map(([l, v, u, h]) =>
    `<div class="stat"><div class="label">${l}</div>
     <div class="value">${v}<small>${u}</small></div>
     <div class="hint">${h}</div></div>`).join('');
}

/* ── 마감 임박 패널 ── */
function renderList(elId, items, { urgentBadge = true } = {}) {
  const el = document.getElementById(elId);
  if (!items.length) { el.innerHTML = '<div class="empty">해당하는 공고가 없어요</div>'; return; }
  el.innerHTML = items.map((n, i) => {
    const s = seriesOf(n);
    const d = dday(effEnd(n));
    const urgent = urgentBadge && (d === 'D-DAY' || (d.startsWith('D-') && +d.slice(2) <= 7));
    const fav = !!my[n.id];
    const st = applyState(n);
    const badge = st && st.cls !== 'closed' ? `<span class="stb ${st.cls}">${st.label}</span>` : '';
    return `<div class="due-item" data-i="${i}">
      <button class="fav ${fav ? 'on' : ''}" data-i="${i}" aria-label="즐겨찾기">${fav ? '★' : '☆'}</button>
      <span class="dot" style="background:${s.color}"></span>
      <span class="t"><span class="name">${n.title}</span>
      <span class="when">${badge}~ ${effEnd(n)} 마감 · ${n.source}</span></span>
      <span class="dday ${urgent ? 'urgent' : ''}">${d}</span>
    </div>`;
  }).join('');
  el.querySelectorAll('.due-item').forEach(row =>
    row.onclick = () => showDetail(items[+row.dataset.i]));
  el.querySelectorAll('.fav').forEach(btn =>
    btn.onclick = e => { e.stopPropagation(); toggleFav(items[+btn.dataset.i]); });
}

// 즐겨찾기 토글 = '관심' 상태로 등록/해제 (내 청약 저장소 재활용)
function toggleFav(n) {
  if (!session) return promptLogin();
  if (my[n.id]) { delete my[n.id]; saveMy(); remoteDelete(n.id); }
  else { my[n.id] = { status: '관심', updatedAt: nowISO() }; saveMy(); remoteUpsert(n.id); }
  refresh();
}

function renderDue() {
  const open = n => effEnd(n) && effEnd(n) >= todayISO;
  const byEnd = (a, b) => effEnd(a).localeCompare(effEnd(b));
  renderList('dueList',
    filtered().filter(n => open(n) && !isRolling(n)).sort(byEnd).slice(0, 8));
  renderList('rollingList',
    filtered().filter(n => open(n) && isRolling(n)).sort(byEnd).slice(0, 8),
    { urgentBadge: false });
}

/* ── 캘린더 ── */
function buildEvents() {
  const evs = [];
  for (const n of filtered()) {
    const s = seriesOf(n), d = n.dates;
    if (isRolling(n)) {
      if (d.winner) {
        evs.push({ title: n.title, start: d.winner,
          backgroundColor: 'transparent', extendedProps: { notice: n, kind: 'winner' } });
      }
      continue;
    }
    if (effStart(n) && effEnd(n)) {
      evs.push({ title: n.title, start: effStart(n), end: plusDay(effEnd(n)),
        backgroundColor: 'transparent', extendedProps: { notice: n, kind: 'apply', s } });
    } else if (d.notice) {
      evs.push({ title: n.title, start: d.notice,
        backgroundColor: 'transparent', extendedProps: { notice: n, kind: 'notice', s } });
    }
    if (d.winner) {
      evs.push({ title: n.title, start: d.winner,
        backgroundColor: 'transparent', extendedProps: { notice: n, kind: 'winner' } });
    }
  }
  return evs;
}

function renderEvent(arg) {
  const { kind, s } = arg.event.extendedProps;
  const notice = arg.event.extendedProps.notice;
  const pinColor = kind === 'winner' ? 'var(--winner)' : s.color;
  const prefix = kind === 'winner' ? '발표 · ' : kind === 'notice' ? '공고 · ' : '';
  const star = my[notice.id] ? '⭐ ' : '';

  // 목록(list) 뷰: 제목이 다 보이도록 색점 + 접두 + 전체 제목
  if (arg.view.type === 'listMonth') {
    const el = document.createElement('span');
    el.style.cssText = 'display:flex;align-items:center;gap:8px;min-width:0';
    el.innerHTML = `<span class="lpin" style="background:${pinColor}"></span>
      <span style="min-width:0">${star}${prefix}${arg.event.title}</span>`;
    return { domNodes: [el] };
  }

  // 월간 그리드 뷰: 틴트 막대
  const bg = kind === 'apply' ? s.bg : kind === 'winner' ? 'var(--winner-bg)' : 'transparent';
  const el = document.createElement('div');
  el.className = 'ev';
  el.style.cssText = `background:${bg};border-radius:6px;padding:2px 6px;width:100%;`;
  el.innerHTML = `<span class="pin" style="background:${pinColor}"></span>
                  <span class="txt">${star}${prefix}${arg.event.title}</span>`;
  return { domNodes: [el] };
}

function initCalendar() {
  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    locale: 'ko',
    height: 'auto',
    headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
    buttonText: { today: '오늘' },
    titleFormat: { year: 'numeric', month: 'long' },
    events: buildEvents(),
    eventContent: renderEvent,
    eventClick: info => showDetail(info.event.extendedProps.notice),
    dayMaxEventRows: 4,
    moreLinkContent: a => `+${a.num}건`,
  });
  calendar.render();
}

// 목록에서 해당 날짜(없으면 그 이후 첫 날짜) 그룹으로 스크롤
function scrollListToDate(val) {
  const days = [...document.querySelectorAll('#calendar .fc-list-day')];
  if (!days.length) return;
  const el = days.find(d => d.dataset.date === val)
    || days.find(d => d.dataset.date > val)
    || days[days.length - 1];
  el?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // 잠깐 하이라이트
  el?.classList.add('jump-hi');
  setTimeout(() => el?.classList.remove('jump-hi'), 1200);
}

// 목록 뷰 헤더 우측에 날짜 선택 위젯을 실제로 배치 (툴바 리렌더에도 재부착)
function mountMonthField() {
  const chunk = document.querySelector('#calendar .fc-toolbar-chunk:last-child');
  if (chunk && !chunk.contains(mpick)) {
    mpick.hidden = false;
    mpick.className = 'shown';
    chunk.innerHTML = '';
    chunk.appendChild(mpick);
  }
  const dt = calendar.getDate();
  mpick.value = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-01`;
}

/* ── 상세 ── */
function showDetail(n) {
  const d = n.dates, c = n.complexes?.[0] || {};
  const regionCls = n.region === '서울특별시' ? 'region-seoul' : 'region-gyeonggi';
  const chips = [
    `<span class="chip ${regionCls}">${n.region === '서울특별시' ? '서울' : '경기'}</span>`,
    n.supplyType && `<span class="chip">${n.supplyType}</span>`,
    n.status && `<span class="chip">${n.status}</span>`,
    effEnd(n) && effEnd(n) >= todayISO && `<span class="chip dchip">마감 ${dday(effEnd(n))}</span>`,
    `<span class="chip src">${n.source === 'LH' ? 'LH청약플러스' : '마이홈'} 제공</span>`,
  ].filter(Boolean).join('');
  document.getElementById('dlgChips').innerHTML = chips;
  document.getElementById('dlgTitle').textContent = n.title;
  document.getElementById('dlgMeta').textContent =
    [n.institution, n.houseType, c.name].filter(Boolean).join(' · ');
  const rows = [
    ['공고일', d.notice], ['공고 마감', d.applyStart ? '' : d.close, true],
    ['청약 접수', fmtRange(d.applyStart, d.applyEnd), true],
    ['서류 접수', fmtRange(d.docStart, d.docEnd)],
    ['당첨자 발표', d.winner, true], ['계약 기간', fmtRange(d.contractStart, d.contractEnd)],
    ['주소', c.address], ['세대수', c.households && `${c.households}세대`],
    ['전용면적', c.area && `${c.area}㎡`], ['입주예정', c.moveIn],
    ['보증금', fmtWon(c.deposit)], ['월임대료', fmtWon(c.monthlyRent)],
  ].filter(([, v]) => v);
  document.getElementById('dlgKv').innerHTML = rows.map(([k, v, strong]) =>
    `<div class="k">${k}</div><div class="v ${strong ? 'strong' : ''}">${v}</div>`).join('');
  document.getElementById('dlgLink').href = n.url;
  renderMyBox(n);
  dlg.showModal();
}

/* ── 내 청약 관리 (상세 팝업 내, 로그인 시에만) ── */
function renderMyBox(n) {
  const box = document.getElementById('dlgStatus');
  const memo = document.getElementById('dlgMemo');

  if (!session) {   // 비로그인: 로그인 유도
    box.innerHTML = '<button class="login-hint">🔒 로그인하고 내 청약 관리하기</button>';
    box.querySelector('.login-hint').onclick = promptLogin;
    memo.value = ''; memo.disabled = true;
    memo.placeholder = '로그인하면 메모를 남길 수 있어요';
    return;
  }
  memo.disabled = false;
  memo.placeholder = '메모 (예: 필요 서류, 순위 조건 확인 등)';

  const mine = my[n.id];
  box.innerHTML = STATUSES.map(s =>
    `<button data-s="${s}" class="${mine?.status === s ? 'on' : ''}">${s}</button>`).join('');
  box.querySelectorAll('button').forEach(btn => btn.onclick = () => {
    const s = btn.dataset.s;
    if (my[n.id]?.status === s) {
      delete my[n.id]; saveMy(); remoteDelete(n.id);   // 같은 상태 다시 누르면 해제
    } else {
      my[n.id] = { ...(my[n.id] || {}), status: s, updatedAt: nowISO() };
      saveMy(); remoteUpsert(n.id);
    }
    renderMyBox(n); refresh();
  });
  memo.value = mine?.memo || '';
  memo.oninput = () => {
    if (!my[n.id]) my[n.id] = { status: '관심' };
    my[n.id].memo = memo.value;
    my[n.id].updatedAt = nowISO();
    saveMy();
    clearTimeout(memo._t);
    memo._t = setTimeout(() => remoteUpsert(n.id), 700);   // 타이핑 멈추면 동기화
  };
}

/* ── 필터 & 탭 ── */
document.getElementById('regionFilter').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (!btn) return;
  region = btn.dataset.r;
  document.querySelectorAll('#regionFilter button').forEach(b => b.classList.toggle('on', b === btn));
  refresh();
});
function refresh() {
  renderStats();
  if (currentView === 'list') { renderMobileList(); return; }
  if (currentView !== 'calendar') return;   // 지도 뷰는 갱신할 것 없음
  renderDue();
  if (!calendar) return;
  // 이벤트를 하나씩 addEvent하면 매번 전체 재렌더(160개 ≈ 1.4초).
  // batchRendering으로 묶으면 한 번만 그린다 (≈ 24ms).
  calendar.batchRendering(() => {
    calendar.removeAllEvents();
    buildEvents().forEach(ev => calendar.addEvent(ev));
  });
}

/* 정렬 함수 (effEnd 없는 공고는 뒤로) */
const SORT_FNS = {
  deadline: (a, b) => (effEnd(a) || 'zzzz').localeCompare(effEnd(b) || 'zzzz'),      // 마감 임박순
  deadlineDesc: (a, b) => (effEnd(b) || '').localeCompare(effEnd(a) || ''),          // 마감 여유순
  notice: (a, b) => (b.dates.notice || '').localeCompare(a.dates.notice || ''),      // 최신 공고순
};

/* 모바일 공고 리스트: 공고 1건 1행, 진행중/마감 필터 + 정렬 */
function renderMobileList() {
  const isOpen = n => effEnd(n) && effEnd(n) >= todayISO;
  const items = filtered()
    .filter(n => listMode === 'open' ? isOpen(n) : (effEnd(n) && effEnd(n) < todayISO));
  // 진행중: 선택한 정렬 / 마감: 최근 마감순 고정
  items.sort(listMode === 'open' ? SORT_FNS[sortMode] : SORT_FNS.deadlineDesc);
  document.getElementById('sortSel').style.display = listMode === 'open' ? '' : 'none';
  renderList('mobileList', items, { urgentBadge: listMode === 'open' });
}

document.getElementById('listFilter').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (!btn) return;
  listMode = btn.dataset.f;
  document.querySelectorAll('#listFilter button').forEach(b => b.classList.toggle('on', b === btn));
  renderMobileList();
});

document.getElementById('sortSel').addEventListener('change', e => {
  sortMode = e.target.value; renderMobileList();
});

document.getElementById('myToggle').onclick = e => {
  if (!session) return promptLogin();
  myOnly = !myOnly;
  e.currentTarget.classList.toggle('on', myOnly);
  refresh();
};

/* ── 뷰 전환 (캘린더 / 목록 / 지도) ── */
const VIEWS = {
  calendar: document.getElementById('cal-view'),
  list: document.getElementById('list-view'),
  map: document.getElementById('map-view'),
};
const TABS = {
  calendar: document.getElementById('tabCal'),
  list: document.getElementById('tabList'),
  map: document.getElementById('tabMap'),
};
const VIEW_DISPLAY = { calendar: 'grid', list: 'block', map: 'block' };
function switchView(view) {
  currentView = view;
  Object.entries(VIEWS).forEach(([k, el]) => el.style.display = k === view ? VIEW_DISPLAY[k] : 'none');
  Object.entries(TABS).forEach(([k, el]) => el.classList.toggle('on', k === view));
  if (view === 'calendar' && !calendar) initCalendar();   // 캘린더는 처음 열 때 생성
  refresh();
}
document.getElementById('tabCal').onclick = () => switchView('calendar');
document.getElementById('tabList').onclick = () => switchView('list');
document.getElementById('tabMap').onclick = () => switchView('map');

renderStats(); updateMyCount();
switchView(currentView);   // 초기 뷰 (폰=목록, 데스크톱=캘린더)

/* ── Supabase 동기화 (로그인 시 여러 기기에서 내 청약 공유) ── */
const SUPABASE_URL = 'https://nknxzlrqffoqcbooghvb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0MNt1sJFr31SIllN1jK4GA_ttJaj1wN';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const authBtn = document.getElementById('authBtn');

authBtn.onclick = () => {
  if (session) sb.auth.signOut();
  else sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + location.pathname },
  });
};

function updateAuthUI() {
  if (session) {
    // 이메일은 @ 앞부분만 (좁은 화면 대응)
    authBtn.textContent = '👤 ' + (session.user.email?.split('@')[0] || '로그인됨');
    authBtn.classList.add('in');
    authBtn.title = '클릭하면 로그아웃';
  } else {
    authBtn.textContent = '로그인';
    authBtn.classList.remove('in');
    authBtn.title = '구글 로그인 (여러 기기 동기화)';
  }
}

// 개별 공고 원격 저장/삭제 (비로그인 시 아무것도 안 함)
async function remoteUpsert(id) {
  if (!session) return;
  const r = my[id]; if (!r) return;
  const { error } = await sb.from('my_notices').upsert({
    user_id: session.user.id, notice_id: id,
    status: r.status || null, memo: r.memo || null, updated_at: r.updatedAt || nowISO(),
  });
  if (error) console.error('upsert 실패', error);
}
async function remoteDelete(id) {
  if (!session) return;
  const { error } = await sb.from('my_notices').delete().eq('notice_id', id);
  if (error) console.error('delete 실패', error);
}

// 로그인 시: 원격(Supabase)에서 내 청약을 불러온다 (로컬 저장 없음)
async function syncOnLogin() {
  const { data: rows, error } = await sb.from('my_notices').select('*');
  if (error) { console.error('불러오기 실패', error); return; }
  my = {};
  (rows || []).forEach(r => my[r.notice_id] = {
    status: r.status || '관심', memo: r.memo || '', updatedAt: r.updated_at,
  });
  updateMyCount(); refresh();
}

sb.auth.onAuthStateChange((event, sess) => {
  session = sess;
  updateAuthUI();
  if (event === 'SIGNED_IN') syncOnLogin();
  else if (event === 'SIGNED_OUT') {   // 로그아웃: 내 청약 비우기
    my = {}; myOnly = false;
    document.getElementById('myToggle').classList.remove('on');
    updateMyCount(); refresh();
  }
});
sb.auth.getSession().then(({ data }) => {
  session = data.session;
  updateAuthUI();
  if (session) syncOnLogin();
});
</script>
